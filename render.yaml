# Render.com Blueprint — deploys the whole app as ONE free web service.
#
# The build step installs deps, builds the React frontend into client/dist,
# and seeds the SQLite database. Express then serves BOTH the API and the
# built frontend from a single public URL.
#
# NOTE ON THE FREE PLAN:
# Render's free tier has an EPHEMERAL filesystem (no persistent disk), so the
# SQLite file is re-created and re-seeded on every deploy/restart. That means
# the app always boots with the provided mock data (exactly what the brief
# asks for), but data added at runtime resets when the free instance sleeps
# or redeploys. This is the correct trade-off for a free demo deployment.
# (To make runtime data permanent, upgrade to a paid plan and add a `disk:`
#  block with mountPath: /data plus DATABASE_PATH=/data/data.sqlite.)
#
# To use: push this repo to GitHub, then on Render click
# "New +" -> "Blueprint" and point it at the repo.
services:
  - type: web
    name: envision-dashboard
    runtime: node
    plan: free
    buildCommand: >
      npm install --prefix server &&
      npm install --prefix client &&
      npm run build --prefix client &&
      npm run seed --prefix server
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
