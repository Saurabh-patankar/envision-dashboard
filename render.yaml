# Render.com Blueprint — deploys the whole app as ONE web service.
#
# The build step installs deps, builds the React frontend into client/dist,
# and seeds the SQLite database. Express then serves both the API and the
# built frontend from a single public URL.
#
# To use: push this repo to GitHub, then on Render click
# "New +" -> "Blueprint" and point it at the repo.
services:
  - type: web
    name: envision-dashboard
    runtime: node
    plan: free
    # Persist SQLite across restarts on a mounted disk.
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    buildCommand: >
      npm install --prefix server &&
      npm install --prefix client &&
      npm run build --prefix client &&
      DATABASE_PATH=/data/data.sqlite npm run seed --prefix server
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DATABASE_PATH
        value: /data/data.sqlite
